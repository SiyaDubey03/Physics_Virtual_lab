<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSIGNMENT-6</title>
</head>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 40px;
        }

        h2{
            color: #333;
        }

        select{
            padding: 8px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        #capital{
            margin-left: 20px;
            color: darkblue;
            font-weight: bold;
            font-size: 22px;
        }
    </style>
<body>
    <h2>Select a company</h2>
    <select id="company" onchange="showcap()">
        <option value="">---Select---</option>
        <option value="Apple">Apple</option>
        <option value="Infosys">Infosys</option>
        <option value="Google">Google</option>
        <option value="Microsoft">Microsoft</option>
        <option value="Tesla">Tesla</option>
    </select>
    <span id="capital"></span>
    <script>
        function showcap(){
            var company=document.getElementById("company").value;
            var capital="";
            if(company==="Apple"){
                capital="Capital: $2.87 trillion";
            }else if(company==="Infosys"){
                capital="Capital: $1.67 trillion";
            }else if(company==="Google"){
                capital="Capital: $1.85 trillion";
            }else if(company==="Microsoft"){
                capital="Capital: $3.01 trillion";
            }else if(company==="Tesla"){
                capital="Capital: $650 bilion";
            }

            document.getElementById("capital").innerText=capital;
        }
    </script>
</body>
</html>
